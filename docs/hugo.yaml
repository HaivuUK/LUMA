# Configuration
baseURL: https://example.org/
locale: en-GB
title: LUMA Documentation

enableRobotsTXT: true
enableGitInfo: true
# enableEmoji: true
hasCJKLanguage: true
enableInlineShortcodes: true

# services:
#   googleAnalytics:
#     ID: G-MEASUREMENT_ID

disableKinds:
  - taxonomy

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

defaultContentLanguage: en
languages:
  en:
    label: English
    weight: 1
    title: LUMA
    contentDir: "content/en"
  sv:
    label: Svenska
    weight: 2
    title: LUMA
    contentDir: "content/sv"
  cn:
    label: 中文
    weight: 3
    title: LUMA
    contentDir: "content/cn"
  it:
    label: Italiano
    weight: 4
    title: LUMA
    contentDir: "content/it"

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

menu:
  main:
    - identifier: docs
      name: Documentation
      pageRef: /docs
      weight: 1
    - identifier: roadmap
      name: Roadmap
      pageRef: /roadmap
      weight: 2
    - identifier: about
      name: About
      pageRef: /about
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
  footer:
    - identifier: footertext
      name: Local Unit Modulus Assignment (LUMA) is a modern rust application for research and engineering workflows.

params:
  description: Use this documentation to learn how to use LUMA.
  images:
    - images/logos/favicon.png
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logos/favicon.svg
      dark: images/logos/favicon.svg
      width: 25
      height: 25
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: normal

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: false
    base: "https://github.com/HaivuUK/luma/edit/main/content"

  docs:
    list:
      displayTags: false
      # date | lastmod | publishDate | title | weight
      sortBy: weight
      sortOrder: desc # or "asc"

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: imfing/hextra
      repoId: R_kgDOJ9fJag
      category: General
      categoryId: DIC_kwDOJ9fJas4CY7gW
      # mapping: pathname
      # strict: 0
      # reactionsEnabled: 1
      # emitMetadata: 0
      # inputPosition: top
      # lang: en
      # theme: noborder_dark

ignoreLogs:
  - "warning-rendershortcodes-in-html"