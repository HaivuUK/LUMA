name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm64
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Explicitly Add Target to Active Toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # We install tauri-cli globally via cargo since NPM is not used.
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall -y tauri-cli@^2.0.0

      - name: Build Tauri App
        # This automatically respects your tauri.conf.json targets and hooks
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Run macOS custom build script
        if: startsWith(matrix.os, 'macos')
        run: |
          chmod +x buildscripts/macOS/build-mac.sh
          # Passing the target triple and build path as env vars in case your script needs them
          TARGET=${{ matrix.target }} ./buildscripts/macOS/build-mac.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luma-${{ matrix.name }}-artifacts
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            **/*.pkg
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Parses the "version" key out of your tauri.conf.json file
      - name: Extract version from tauri.conf.json
        id: get_version
        run: |
          # If tauri.conf.json is located inside a src-tauri folder, adjust the path below to src-tauri/tauri.conf.json
          VERSION=$(jq -r '.version' tauri.conf.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted Version: v$VERSION"

      # Downloads all files compiled by the matrix above into a combined folder
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      # Packages everything cleanly into a Draft Release
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: false
          files: |
            ./downloaded-artifacts/**/*
