name: Build

on:
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm64
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Explicitly Add Target to Active Toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install tauri-cli globally via cargo
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall -y tauri-cli@^2

      - name: Build Tauri App
        # respect tauri.conf.json targets and hooks
        if: "!startsWith(matrix.os, 'macos')"
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Run macOS custom build script
        if: startsWith(matrix.os, 'macos')
        run: |
          chmod +x buildscripts/macOS/build-mac.sh
          ./buildscripts/macOS/build-mac.sh ${{ matrix.target }} 

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luma-${{ matrix.name }}-artifacts
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            *.pkg
            *.tar.gz
          if-no-files-found: warn